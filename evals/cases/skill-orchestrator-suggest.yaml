id: heyeddi-orchestrator-suggest
skills:
  - heyeddi-orchestrator
project_template: product-app
prompt_file: prompts/heyeddi-orchestrator-suggest.md
verify_commands: []
judge: |
  @heyeddi-orchestrator ran load_catalog + suggest_skills for settings handoff prompt and wrote/refreshed
  .heyeddi/skills-index.md with ordered @skill recommendations. No UI implementation.
assertions:
  - name: suggest-skills
    type: command
    cmd:
      - python3
      - .agents/skills/heyeddi-orchestrator/scripts/suggest_skills.py
      - --project-root
      - "{project_root}"
      - --user-prompt
      - Build TaskFlow settings handoff from mockups
    expect_exit_zero: true
