<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Contrast violations fixture</title>
  <style>
  @keyframes shift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  body { margin: 0; font-family: system-ui, sans-serif; }
  .green-on-green {
    background: #22c55e;
    color: #16a34a;
    padding: 2rem;
    font-size: 1.25rem;
  }
  .hero {
    min-height: 240px;
    padding: 2rem;
    background: linear-gradient(120deg, #0f766e, #22d3ee, #a7f3d0);
    background-size: 200% 200%;
    animation: shift 4s ease infinite;
  }
  .hero p {
    color: #d1d5db;
    font-size: 1rem;
    max-width: 28rem;
  }
  </style>
</head>
<body>
  <section class="green-on-green">
    <h1>Green headline on green panel</h1>
    <p>This text should fail same-hue contrast checks.</p>
  </section>
  <section class="hero">
    <h2>Animated gradient hero</h2>
    <p>Light gray marketing copy over a moving teal gradient: illegible in motion.</p>
  </section>
</body>
</html>
