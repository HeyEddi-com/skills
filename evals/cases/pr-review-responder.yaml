id: heyeddi-pr-respond-workflow
skills:
  - heyeddi-pr-respond
project_template: pr-review-fixture
prompt_file: prompts/pr-review/handle-review.md
verify_commands:
  - python .agents/skills/heyeddi-pr-respond/scripts/fetch_pr_comments.py --pr 42 --fixture .pr-fixture/comments.json --project-root .
judge: |
  @heyeddi-pr-respond completed the team PR workflow on fixture PR #42:

  - fetch_pr_comments run with --fixture (no gh required)
  - .heyeddi/docs/pr-42-tracking.md lists EVERY comment ID from fixture (inline 9001001, 9001002; discussion DC_10001; reviews 8001, 8002)
  - .heyeddi/docs/pr-42-replies.md has drafted reply per comment + summary last
  - fix-vs-decline decisions are reasoned (pagination + Depends = fix; loading state = fix or plan)

  Read all generated docs. Do not require live gh posts in eval.
